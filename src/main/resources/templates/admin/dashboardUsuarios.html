<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .page-item.active .page-link { background-color: #212529; border-color: #212529; }
        .page-link { color: #212529; }
        .page-link:hover { color: #000; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="#">Sistema de Empleados</a>
    <div class="d-flex gap-2">
        <a href="/admin/usuarios" class="btn btn-outline-light btn-sm">
            <i class="bi bi-people"></i> Usuarios
        </a>
        <a href="/admin/horarios" class="btn btn-outline-light btn-sm">
            <i class="bi bi-clock"></i> Horarios
        </a>
        <a href="/admin/reportes" class="btn btn-outline-light btn-sm active">
            <i class="bi bi-file-earmark-bar-graph"></i> Reportes
        </a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4 text-center">Administración de Usuarios</h2>

    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">Nuevo Usuario</div>
                <div class="card-body">
                    <form th:action="@{/admin/guardar}" method="post">
                        <div class="mb-2">
                            <input type="text" name="cedula" placeholder="Cédula"
                                   class="form-control" required/>
                        </div>
                        <div class="mb-2">
                            <input type="text" name="nombre" placeholder="Nombre"
                                   class="form-control" required/>
                        </div>
                        <div class="mb-2">
                            <input type="email" name="correo" placeholder="usuario@ejemplo.com"
                                   class="form-control" required
                                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                                   title="Por favor, ingresa un correo electrónico válido."/>
                        </div>
                        <div class="mb-2">
                            <input type="password" name="contrasenia" placeholder="Contraseña"
                                   class="form-control" required/>
                        </div>
                        <div class="mb-2">
                            <select name="rol" class="form-control">
                                <option value="ADMIN">Administrador</option>
                                <option value="EMPLEADO">Empleado</option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-success">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <span><i class="bi bi-people"></i> Lista de Usuarios</span>
                    <div class="input-group" style="max-width: 280px;">
                        <span class="input-group-text bg-secondary border-0 text-white">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" id="buscarUsuario" class="form-control form-control-sm"
                               placeholder="Buscar por nombre..."/>
                    </div>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Editar</th>
                                <th>Inactivar</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoUsuarios">
                            <tr th:if="${#lists.isEmpty(usuarios)}">
                                <td colspan="7" class="text-center text-muted py-3">
                                    No hay usuarios registrados.
                                </td>
                            </tr>
                            <tr th:each="u : ${usuarios}" class="fila-usuario">
                                <td th:text="${u.idUsuario}"></td>
                                <td th:text="${u.cedula}"></td>
                                <td class="nombre-usuario" th:text="${u.nombre}"></td>
                                <td th:text="${u.correo}"></td>
                                <td th:text="${u.rol}"></td>
                                <td>
                                    <button class="btn btn-warning btn-sm"
                                            th:data-id="${u.idUsuario}"
                                            th:data-cedula="${u.cedula}"
                                            th:data-nombre="${u.nombre}"
                                            th:data-correo="${u.correo}"
                                            th:data-rol="${u.rol}"
                                            onclick="prepararEdicion(this)">
                                        <i class="bi bi-pencil"></i> Editar
                                    </button>
                                </td>
                                <td>
                                    <button class="btn btn-danger btn-sm"
                                            th:onclick="confirmarEliminar([[${u.idUsuario}]])">
                                        <i class="bi bi-person-x"></i> Inactivar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <small class="text-muted" id="infoUsuarios"></small>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="paginacionUsuarios"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/admin/guardar}" method="post">
                    <input type="hidden" id="idUsuario" name="idUsuario"/>
                    <div class="mb-3">
                        <label class="form-label">Cédula</label>
                        <input class="form-control" id="cedula" name="cedula" required readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" id="nombre" name="nombre" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" id="correo" name="correo" required
                               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                               title="Por favor, ingresa un correo electrónico válido."/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select class="form-control" id="rol" name="rol">
                            <option value="ADMIN">Administrador</option>
                            <option value="EMPLEADO">Empleado</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    //alert
    const successMsg = /*[[${success}]]*/ null;
    const errorMsg   = /*[[${error}]]*/   null;

    if (successMsg) {
        Swal.fire({ icon: 'success', title: '¡Éxito!', text: successMsg, timer: 3000 });
    }
    if (errorMsg) {
        const mensajeFinal = errorMsg.includes('50000')
            ? 'La cédula ingresada ya se encuentra registrada en el sistema.'
            : errorMsg;
        Swal.fire({ icon: 'error', title: 'Error de proceso', text: mensajeFinal });
    }

    //editar
    function prepararEdicion(btn) {
        document.getElementById('idUsuario').value = btn.getAttribute('data-id');
        document.getElementById('cedula').value    = btn.getAttribute('data-cedula');
        document.getElementById('nombre').value    = btn.getAttribute('data-nombre');
        document.getElementById('correo').value    = btn.getAttribute('data-correo');
        document.getElementById('rol').value       = btn.getAttribute('data-rol');
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    //inactivar
    function confirmarEliminar(id) {
        Swal.fire({
            title: '¿Inactivar usuario?',
            text: 'Esta acción solo se puede deshacer mediante el admin de base de datos.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Sí, inactivar',
            cancelButtonText: 'Cancelar'
        }).then(result => {
            if (result.isConfirmed) window.location.href = '/admin/eliminar/' + id;
        });
    }

    //paginacion y busqueda
    (function () {
        const FILAS_POR_PAGINA = 5;

        const inputBuscar  = document.getElementById('buscarUsuario');
        const cuerpo       = document.getElementById('cuerpoUsuarios');
        const infoPagina   = document.getElementById('infoUsuarios');
        const paginacion   = document.getElementById('paginacionUsuarios');

        let todasLasFilas  = Array.from(cuerpo.querySelectorAll('tr.fila-usuario'));
        let filasFiltradas = [...todasLasFilas];
        let paginaActual   = 1;

        inputBuscar.addEventListener('input', function () {
            const termino = this.value.trim().toLowerCase();
            filasFiltradas = todasLasFilas.filter(fila =>
                fila.querySelector('.nombre-usuario').textContent.toLowerCase().includes(termino)
            );
            paginaActual = 1;
            renderizar();
        });

        function renderizar() {
            const total     = filasFiltradas.length;
            const totalPags = Math.max(1, Math.ceil(total / FILAS_POR_PAGINA));
            paginaActual    = Math.min(paginaActual, totalPags);

            const inicio = (paginaActual - 1) * FILAS_POR_PAGINA;
            const fin    = inicio + FILAS_POR_PAGINA;

            todasLasFilas.forEach(f => f.style.display = 'none');
            filasFiltradas.slice(inicio, fin).forEach(f => f.style.display = '');

            let sinResultados = cuerpo.querySelector('tr.sin-resultados');
            if (total === 0) {
                if (!sinResultados) {
                    sinResultados = document.createElement('tr');
                    sinResultados.className = 'sin-resultados';
                    sinResultados.innerHTML =
                        '<td colspan="7" class="text-center text-muted py-3">No se encontraron usuarios.</td>';
                    cuerpo.appendChild(sinResultados);
                }
                sinResultados.style.display = '';
            } else {
                if (sinResultados) sinResultados.style.display = 'none';
            }

            const desde = total === 0 ? 0 : inicio + 1;
            const hasta = Math.min(fin, total);
            infoPagina.textContent = `Mostrando ${desde}–${hasta} de ${total} usuario(s)`;

            renderizarPaginacion(totalPags);
        }

        function renderizarPaginacion(totalPags) {
            paginacion.innerHTML = '';

            paginacion.appendChild(crearItem('&laquo;', paginaActual === 1, () => {
                paginaActual--; renderizar();
            }));

            for (let i = 1; i <= totalPags; i++) {
                const num = i;
                paginacion.appendChild(crearItem(i, false, () => {
                    paginaActual = num; renderizar();
                }, i === paginaActual));
            }

            paginacion.appendChild(crearItem('&raquo;', paginaActual === totalPags, () => {
                paginaActual++; renderizar();
            }));
        }

        function crearItem(label, deshabilitado, onClick, activo = false) {
            const li = document.createElement('li');
            li.className = 'page-item'
                + (deshabilitado ? ' disabled' : '')
                + (activo        ? ' active'   : '');
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href      = '#';
            a.innerHTML = label;
            if (!deshabilitado) {
                a.addEventListener('click', e => { e.preventDefault(); onClick(); });
            }
            li.appendChild(a);
            return li;
        }

        renderizar();
    })();
</script>
</body>
</html>
