<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Horarios</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4">
      <span class="navbar-brand"> Control de Empleados </span>

      <div class="d-flex gap-3 align-items-center">
        <a href="/users/inicio" class="btn btn-outline-light btn-sm">
          <i class="bi bi-house"></i> Inicio
        </a>

        <a href="/users/horarios" class="btn btn-outline-light btn-sm">
          <i class="bi bi-clock"></i> Horarios
        </a>

        <form th:action="@{/logout}" method="post" class="d-inline">
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <button type="submit" class="btn btn-outline-light btn-sm">
            Cerrar Sesión
          </button>
        </form>
      </div>
    </nav>

    <div class="container py-4">
      <h4 class="mb-3"><i class="bi bi-calendar-check"></i> Mis Horarios</h4>

      <div
        th:if="${success}"
        class="alert alert-success alert-dismissible fade show"
      >
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${error}"
        class="alert alert-danger alert-dismissible fade show"
      >
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${error}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap align-items-center gap-3">
          <div>
            <span class="fs-6 me-2">Estado actual:</span>
            <span th:if="${tieneEntradaActiva}" class="badge bg-success fs-6">
              <i class="bi bi-circle-fill"></i> En línea
            </span>
            <span
              th:unless="${tieneEntradaActiva}"
              class="badge bg-secondary fs-6"
            >
              <i class="bi bi-circle"></i> Fuera de línea
            </span>
          </div>
          <form th:action="@{/users/marcarEntrada}" method="post">
            <button
              type="submit"
              class="btn btn-success"
              th:disabled="${tieneEntradaActiva}"
            >
              <i class="bi bi-box-arrow-in-right"></i> Marcar Entrada
            </button>
          </form>
          <form th:action="@{/users/marcarSalida}" method="post">
            <button
              type="submit"
              class="btn btn-danger"
              th:disabled="${!tieneEntradaActiva}"
            >
              <i class="bi bi-box-arrow-right"></i> Marcar Salida
            </button>
          </form>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-header bg-secondary text-white">
          <i class="bi bi-funnel"></i> Filtrar por día
        </div>
        <div class="card-body">
          <form
            th:action="@{/users/horarios}"
            method="get"
            class="row g-2 align-items-end"
          >
            <div class="col-sm-4">
              <label class="form-label fw-semibold">Fecha</label>
              <input
                type="date"
                name="fecha"
                class="form-control"
                th:value="${fechaFiltro}"
              />
            </div>
            <div class="col-sm-auto">
              <button type="submit" class="btn btn-dark">
                <i class="bi bi-search"></i> Filtrar
              </button>
            </div>
            <div class="col-sm-auto" th:if="${fechaFiltro != null}">
              <a href="/users/horarios" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle"></i> Limpiar
              </a>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
        >
          <span><i class="bi bi-table"></i> Historial de Horarios</span>
          <span
            th:if="${fechaFiltro != null}"
            class="badge bg-warning text-dark"
          >
            <span
              th:text="${#temporals.format(fechaFiltro, 'dd/MM/yyyy')}"
            ></span>
            &nbsp;— <span th:text="${#lists.size(horarios)}"></span> registro(s)
          </span>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th><i class="bi bi-arrow-right-circle"></i> Entrada</th>
                <th><i class="bi bi-arrow-left-circle"></i> Salida</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(horarios)}">
                <td colspan="4" class="text-center text-muted py-3">
                  No hay registros
                  <span th:if="${fechaFiltro != null}">
                    para el día seleccionado</span
                  >.
                </td>
              </tr>
              <tr th:each="h, stat : ${horarios}">
                <td th:text="${stat.count}"></td>
                <td
                  th:text="${#temporals.format(h.horaEntrada, 'dd/MM/yyyy HH:mm:ss')}"
                ></td>
                <td>
                  <span
                    th:if="${h.horaSalida != null}"
                    th:text="${#temporals.format(h.horaSalida, 'dd/MM/yyyy HH:mm:ss')}"
                  >
                  </span>
                  <span
                    th:unless="${h.horaSalida != null}"
                    class="text-muted fst-italic"
                    >Pendiente</span
                  >
                </td>
                <td>
                  <span
                    th:text="${h.estado}"
                    th:classappend="${h.estado == 'En línea'} ? 'badge bg-success' : 'badge bg-secondary'"
                  >
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
