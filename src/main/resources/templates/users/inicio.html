<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal del Empleado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .hero-section {
        padding: 80px 0;
      }
      .card-custom {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark px-4">
      <span class="navbar-brand"> Control de Empleados </span>

      <div class="d-flex gap-3 align-items-center">
        <a href="/users/inicio" class="btn btn-outline-light btn-sm">
          <i class="bi bi-house"></i> Inicio
        </a>

        <a href="/users/horarios" class="btn btn-outline-light btn-sm">
          <i class="bi bi-clock"></i> Horarios
        </a>

        <!-- Logout -->
        <form th:action="@{/logout}" method="post" class="d-inline">
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <button type="submit" class="btn btn-outline-light btn-sm">
            Cerrar Sesión
          </button>
        </form>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card card-custom p-4 text-center">
            <h2 class="text-primary">¡Bienvenido al sistema!</h2>
            <p class="lead mt-3">
              Has ingresado exitosamente al portal de usuario.
            </p>

            <div class="mt-4">
              <img
                src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                alt="Perfil"
                width="100"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
